server.port=8082
spring.application.name=notification-service

spring.datasource.url=jdbc:postgresql://localhost:5434/notificationsdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Deve ser idêntico ao configurado no order-service para que ambos referenciem a mesma fila
rabbitmq.exchange=orders.exchange
rabbitmq.queue.order-created=order.created
rabbitmq.routing-key.order-created=order.created
